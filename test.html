<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>NGワードチェッカー - ユニットテスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #summary { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
    .pass { color: green; }
    .fail { color: red; }
    li { font-family: monospace; }
  </style>
</head>
<body>
  <h1>NGワードチェッカー ユニットテスト</h1>
  <div id="summary"></div>
  <ul id="results"></ul>

  <script>
    // ===== テストヘルパ =====
    const results = [];
    function runTest(name, actual, expected) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      results.push({ name, ok });
      const li = document.createElement('li');
      li.textContent = (ok ? '[PASS] ' : '[FAIL] ') + name +
        ' → 期待: ' + JSON.stringify(expected) + ' / 実際: ' + JSON.stringify(actual);
      li.className = ok ? 'pass' : 'fail';
      document.getElementById('results').appendChild(li);
    }

    // ===== ここに被テスト関数とテストケースを追記していく =====

    // --- 被テスト関数: escapeHtml ---
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // --- テストケース: escapeHtml ---
    runTest('escapeHtml: < をエスケープ', escapeHtml('<'), '&lt;');
    runTest('escapeHtml: > をエスケープ', escapeHtml('>'), '&gt;');
    runTest('escapeHtml: & をエスケープ', escapeHtml('&'), '&amp;');
    runTest('escapeHtml: " をエスケープ', escapeHtml('"'), '&quot;');
    runTest("escapeHtml: ' をエスケープ", escapeHtml("'"), '&#39;');
    runTest('escapeHtml: 複合', escapeHtml('<scr' + 'ipt>alert("x")</scr' + 'ipt>'), '&lt;script&gt;alert(&quot;x&quot;)&lt;/script&gt;');
    runTest('escapeHtml: 通常文字はそのまま', escapeHtml('機密資料'), '機密資料');

    // --- 被テスト関数: normalize ---
    function normalize(str) {
      // 1. 小文字化
      let s = String(str).toLowerCase();
      // 2. NFKC 正規化（全角→半角・濁点結合など）
      s = s.normalize('NFKC');
      // 3. ひらがな(U+3041..U+3096) → カタカナ(+0x60)
      s = s.replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
      // 4. NFKC後も小文字化を再適用（半角化された英字の大小区別を統一）
      s = s.toLowerCase();
      return s;
    }

    // --- テストケース: normalize ---
    runTest('normalize: 全角英字→半角小文字', normalize('ＡＢＣ'), 'abc');
    runTest('normalize: 全角数字→半角', normalize('１２３'), '123');
    runTest('normalize: カタカナはそのまま', normalize('キーワード'), 'キーワード');
    runTest('normalize: ひらがな→カタカナ', normalize('きーわーど'), 'キーワード');
    runTest('normalize: 大文字→小文字', normalize('Test'), 'test');
    runTest('normalize: 全角英字混在大文字→小文字', normalize('Ｔｅｓｔ'), 'test');
    runTest('normalize: ひらがな濁点', normalize('がざだ'), 'ガザダ');
    runTest('normalize: 空文字', normalize(''), '');

    // --- 被テスト関数: checkText ---
    function checkText(text, words) {
      const normalizedText = normalize(text);
      const matches = [];
      for (const word of words) {
        const nw = normalize(word);
        if (nw === '') continue;  // 空単語は無視
        // 非重複スキップ方式で出現回数をカウント
        let count = 0;
        let pos = 0;
        while (true) {
          const found = normalizedText.indexOf(nw, pos);
          if (found === -1) break;
          count++;
          pos = found + nw.length;
        }
        if (count > 0) {
          matches.push({ word: word, normalizedWord: nw, count: count });
        }
      }
      return matches;
    }

    // --- テストケース: checkText ---
    // 部分一致
    runTest('checkText: 部分一致ヒット',
      checkText('機密資料を送付', ['機密']),
      [{ word: '機密', normalizedWord: '機密', count: 1 }]);
    // 正規化一致（ひらがな単語でカタカナ本文にヒット）
    runTest('checkText: 正規化一致',
      checkText('キーワード一覧', ['きーわーど']),
      [{ word: 'きーわーど', normalizedWord: 'キーワード', count: 1 }]);
    // ヒットなし
    runTest('checkText: ヒットなしは空配列',
      checkText('安全な文章', ['機密']), []);
    // 空テキスト
    runTest('checkText: 空テキストは空配列',
      checkText('', ['機密']), []);
    // 空単語は無視
    runTest('checkText: 空単語は無視',
      checkText('本文', ['', '  ']), []);
    // 非重複スキップ（aaaa / aa → 2回）
    runTest('checkText: 非重複スキップカウント',
      checkText('aaaa', ['aa']),
      [{ word: 'aa', normalizedWord: 'aa', count: 2 }]);
    // 複数単語
    runTest('checkText: 複数単語の混在',
      checkText('機密と社外秘の機密', ['機密', '社外秘']),
      [
        { word: '機密', normalizedWord: '機密', count: 2 },
        { word: '社外秘', normalizedWord: '社外秘', count: 1 }
      ]);

    // ===== 最後に結果集計を表示 =====
    function showSummary() {
      const total = results.length;
      const failed = results.filter(r => !r.ok).length;
      const passed = total - failed;
      const el = document.getElementById('summary');
      el.textContent = '全 ' + total + ' 件 / 合格 ' + passed + ' / 失敗 ' + failed;
      el.className = failed === 0 ? 'pass' : 'fail';
    }

    showSummary();
  </script>
</body>
</html>
