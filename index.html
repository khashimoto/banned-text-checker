<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGワードチェッカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- ヘッダー -->
    <header class="mb-6">
      <h1 class="text-2xl md:text-3xl font-bold">NGワードチェッカー</h1>
      <p class="text-sm text-gray-600 mt-1">テキストを貼り付けて「チェック」ボタンを押すと、設定した単語に合致する箇所を表示します。</p>
    </header>

    <!-- localStorage 不可時バナー（初期は非表示） -->
    <div id="storage-banner" class="hidden mb-4 p-3 bg-yellow-100 border border-yellow-400 text-yellow-800 rounded text-sm"></div>

    <!-- メイン: 入力 + 結果 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <!-- 左ペイン: 入力 -->
      <section class="bg-white p-4 rounded shadow">
        <label for="input-text" class="block font-semibold mb-2">チェック対象テキスト</label>
        <textarea id="input-text" class="w-full h-64 p-2 border border-gray-300 rounded font-mono text-sm" placeholder="ここにテキストを貼り付けてください"></textarea>
        <div class="mt-2 flex gap-2">
          <button id="btn-check" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">チェック</button>
          <button id="btn-clear" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">クリア</button>
        </div>
      </section>

      <!-- 右ペイン: 結果 -->
      <section class="bg-white p-4 rounded shadow">
        <h2 class="font-semibold mb-2">チェック結果</h2>
        <div id="result-list" class="mb-3 text-sm"></div>
        <div class="border-t pt-3">
          <p class="text-xs text-gray-500 mb-1">ハイライト表示:</p>
          <div id="highlight-area" class="w-full h-48 overflow-auto p-2 border border-gray-200 rounded bg-gray-50 font-mono text-sm whitespace-pre-wrap"></div>
        </div>
      </section>
    </div>

    <!-- 下部ペイン: 単語管理 -->
    <section class="bg-white p-4 rounded shadow">
      <h2 class="font-semibold mb-3">チェック単語の管理</h2>

      <!-- ユーザー追加単語 -->
      <div class="mb-4">
        <p class="text-sm font-medium mb-2">あなたの追加単語（この端末に保存されます）</p>
        <div class="flex gap-2 mb-2">
          <input id="user-word-input" type="text" class="flex-1 p-2 border border-gray-300 rounded text-sm" placeholder="追加する単語を入力（Enter でも追加可）" maxlength="100">
          <button id="btn-add-word" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">追加</button>
        </div>
        <ul id="user-words-list" class="flex flex-wrap gap-2 text-sm"></ul>
      </div>

      <!-- デフォルト単語（折りたたみ） -->
      <details class="text-sm">
        <summary class="cursor-pointer text-gray-600 hover:text-gray-800">デフォルト単語（変更不可）</summary>
        <ul id="default-words-list" class="mt-2 flex flex-wrap gap-2"></ul>
      </details>
    </section>
  </div>

  <script>
    // ===== アプリロジック（後続タスクで実装） =====

    // ===== 定数 =====
    const DEFAULT_WORDS = ['機密', '社外秘', '個人情報'];
    const STORAGE_KEY = 'ngwordchecker.userWords';
    let storageAvailable = true;

    // XSS対策: HTMLに挿入する文字列をエスケープ
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 文字列の正規化: 小文字化 + 全角→半角(NFKC) + ひらがな→カタカナ
    function normalize(str) {
      let s = String(str).toLowerCase();
      s = s.normalize('NFKC');
      s = s.replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
      s = s.toLowerCase();
      return s;
    }

    // テキスト中の単語出現をチェック。戻り値は Match[] の配列
    function checkText(text, words) {
      const normalizedText = normalize(text);
      const matches = [];
      for (const word of words) {
        const nw = normalize(word);
        if (nw === '') continue;
        let count = 0;
        let pos = 0;
        while (true) {
          const found = normalizedText.indexOf(nw, pos);
          if (found === -1) break;
          count++;
          pos = found + nw.length;
        }
        if (count > 0) {
          matches.push({ word: word, normalizedWord: nw, count: count });
        }
      }
      return matches;
    }

    // localStorage からユーザー単語を読込（破損時は空配列）
    function loadUserWords() {
      if (!storageAvailable) return [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw === null) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(x => typeof x === 'string');
      } catch (e) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e2) {}
        return [];
      }
    }

    // localStorage へユーザー単語を保存
    function saveUserWords(words) {
      if (!storageAvailable) return false;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        return true;
      } catch (e) {
        storageAvailable = false;
        return false;
      }
    }
  </script>
</body>
</html>
