<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGワードチェッカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- ヘッダー -->
    <header class="mb-6">
      <h1 class="text-2xl md:text-3xl font-bold">NGワードチェッカー</h1>
      <p class="text-sm text-gray-600 mt-1">テキストを貼り付けて「チェック」ボタンを押すと、設定した単語に合致する箇所を表示します。</p>
    </header>

    <!-- localStorage 不可時バナー（初期は非表示） -->
    <div id="storage-banner" class="hidden mb-4 p-3 bg-yellow-100 border border-yellow-400 text-yellow-800 rounded text-sm"></div>

    <!-- メイン: 入力 + 結果 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <!-- 左ペイン: 入力 -->
      <section class="bg-white p-4 rounded shadow">
        <label for="input-text" class="block font-semibold mb-2">チェック対象テキスト</label>
        <textarea id="input-text" class="w-full h-64 p-2 border border-gray-300 rounded font-mono text-sm" placeholder="ここにテキストを貼り付けてください"></textarea>
        <div class="mt-2 flex gap-2">
          <button id="btn-check" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">チェック</button>
          <button id="btn-clear" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">クリア</button>
        </div>
      </section>

      <!-- 右ペイン: 結果 -->
      <section class="bg-white p-4 rounded shadow">
        <h2 class="font-semibold mb-2">チェック結果</h2>
        <div id="result-list" class="mb-3 text-sm"></div>
        <div class="border-t pt-3">
          <p class="text-xs text-gray-500 mb-1">ハイライト表示:</p>
          <div id="highlight-area" class="w-full h-48 overflow-auto p-2 border border-gray-200 rounded bg-gray-50 font-mono text-sm whitespace-pre-wrap"></div>
        </div>
      </section>
    </div>

    <!-- 下部ペイン: 単語管理 -->
    <section class="bg-white p-4 rounded shadow">
      <h2 class="font-semibold mb-3">チェック単語の管理</h2>

      <!-- ユーザー追加単語 -->
      <div class="mb-4">
        <p class="text-sm font-medium mb-2">あなたの追加単語（この端末に保存されます）</p>
        <div class="flex gap-2 mb-2">
          <input id="user-word-input" type="text" class="flex-1 p-2 border border-gray-300 rounded text-sm" placeholder="追加する単語を入力（Enter でも追加可）" maxlength="100">
          <button id="btn-add-word" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">追加</button>
        </div>
        <ul id="user-words-list" class="flex flex-wrap gap-2 text-sm"></ul>
      </div>

      <!-- デフォルト単語（折りたたみ） -->
      <details class="text-sm">
        <summary class="cursor-pointer text-gray-600 hover:text-gray-800">デフォルト単語（変更不可）</summary>
        <ul id="default-words-list" class="mt-2 flex flex-wrap gap-2"></ul>
      </details>
    </section>
  </div>

  <script>
    // ===== アプリロジック（後続タスクで実装） =====

    // ===== 定数 =====
    const DEFAULT_WORDS = ['機密', '社外秘', '個人情報'];
    const STORAGE_KEY = 'ngwordchecker.userWords';
    let storageAvailable = true;

    // XSS対策: HTMLに挿入する文字列をエスケープ
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 文字列の正規化: 小文字化 + 全角→半角(NFKC) + ひらがな→カタカナ
    function normalize(str) {
      let s = String(str).toLowerCase();
      s = s.normalize('NFKC');
      s = s.replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
      s = s.toLowerCase();
      return s;
    }

    // テキスト中の単語出現をチェック。戻り値は Match[] の配列
    function checkText(text, words) {
      const normalizedText = normalize(text);
      const matches = [];
      for (const word of words) {
        const nw = normalize(word);
        if (nw === '') continue;
        let count = 0;
        let pos = 0;
        while (true) {
          const found = normalizedText.indexOf(nw, pos);
          if (found === -1) break;
          count++;
          pos = found + nw.length;
        }
        if (count > 0) {
          matches.push({ word: word, normalizedWord: nw, count: count });
        }
      }
      return matches;
    }

    // localStorage からユーザー単語を読込（破損時は空配列）
    function loadUserWords() {
      if (!storageAvailable) return [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw === null) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(x => typeof x === 'string');
      } catch (e) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e2) {}
        return [];
      }
    }

    // localStorage へユーザー単語を保存
    function saveUserWords(words) {
      if (!storageAvailable) return false;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        return true;
      } catch (e) {
        storageAvailable = false;
        return false;
      }
    }

    // デフォルト単語 + ユーザー単語を統合（正規化後ベースで重複排除）
    function getAllWords() {
      const combined = DEFAULT_WORDS.concat(loadUserWords());
      const seen = new Set();
      const result = [];
      for (const w of combined) {
        const nw = normalize(w);
        if (nw === '') continue;
        if (seen.has(nw)) continue;
        seen.add(nw);
        result.push(w);
      }
      return result;
    }

    // 本文をハイライト付きで描画（元テキスト走査方式・XSSエスケープ付き）
    function renderHighlight(text, words) {
      const area = document.getElementById('highlight-area');
      if (text.trim() === '') {
        area.innerHTML = '<span class="text-gray-400">（チェック結果がここに表示されます）</span>';
        return;
      }
      if (words.length === 0) {
        area.textContent = text;  // textContent で安全に表示
        return;
      }

      // 正規化済み単語を準備
      const normalizedWords = words.map(normalize).filter(w => w !== '');

      // 元テキストを走査し、ヒット範囲 [i, j) を収集
      const ranges = [];
      let i = 0;
      while (i < text.length) {
        let matchedLen = 0;
        // 各単語について、text[i..] を正規化した先頭が一致するか確認
        for (const nw of normalizedWords) {
          // text[i..] を徐々に伸ばして正規化し、nw で始まる最小長を探す
          let acc = '';
          for (let len = 1; i + len <= text.length; len++) {
            acc = normalize(text.slice(i, i + len));
            if (acc.length < nw.length) continue;       // まだ短い
            if (acc.startsWith(nw)) {
              // nw の文字数分を消費する元テキスト長 = len
              if (len > matchedLen) matchedLen = len;
              break;
            } else {
              // acc が nw より長いのに先頭一致しない → この単語では不一致
              if (acc.length > nw.length) break;
            }
          }
        }
        if (matchedLen > 0) {
          ranges.push([i, i + matchedLen]);
          i += matchedLen;  // 非重複スキップ
        } else {
          i++;
        }
      }

      // エスケープしつつ範囲に <mark> を挿入
      let html = '';
      let cur = 0;
      for (const [start, end] of ranges) {
        html += escapeHtml(text.slice(cur, start));
        html += '<mark class="bg-yellow-300 rounded px-0.5">' + escapeHtml(text.slice(start, end)) + '</mark>';
        cur = end;
      }
      html += escapeHtml(text.slice(cur));
      area.innerHTML = html;
    }

    // ヒット一覧を描画（件数 + 単語名 + 出現回数）
    function renderResultList(matches) {
      const el = document.getElementById('result-list');
      if (matches.length === 0) {
        el.innerHTML = '<p class="text-gray-500">チェック単語に合致する箇所はありませんでした</p>';
        return;
      }
      const total = matches.reduce((sum, m) => sum + m.count, 0);
      let html = '<p class="font-semibold text-red-600 mb-2">⚠ ' + total + ' 箇所ヒットしました</p><ul class="list-disc list-inside space-y-1">';
      for (const m of matches) {
        html += '<li>' + escapeHtml(m.word) + ' （' + m.count + ' 回）</li>';
      }
      html += '</ul>';
      el.innerHTML = html;
    }

    // 単語管理UIを描画（デフォルト単語 + ユーザー単語）
    function renderWordManager() {
      // デフォルト単語（読み取り専用）
      const defaultEl = document.getElementById('default-words-list');
      defaultEl.innerHTML = DEFAULT_WORDS
        .map(w => '<li class="px-2 py-1 bg-gray-100 rounded text-xs">' + escapeHtml(w) + '</li>')
        .join('');

      // ユーザー単語（削除ボタン付き）
      const userEl = document.getElementById('user-words-list');
      const userWords = loadUserWords();
      if (userWords.length === 0) {
        userEl.innerHTML = '<li class="text-gray-400 text-xs">（追加した単語はありません）</li>';
        return;
      }
      userEl.innerHTML = userWords
        .map((w, idx) =>
          '<li class="flex items-center gap-1 px-2 py-1 bg-green-50 border border-green-200 rounded text-xs">' +
          '<span>' + escapeHtml(w) + '</span>' +
          '<button type="button" data-del-index="' + idx + '" class="text-red-500 hover:text-red-700 font-bold" aria-label="削除">×</button>' +
          '</li>')
        .join('');
    }

    const MAX_WORD_LEN = 100;
    const MAX_USER_WORDS = 1000;

    // ユーザー単語を追加（バリデーション付き）
    function addUserWord() {
      const input = document.getElementById('user-word-input');
      const raw = input.value.trim();
      if (raw === '') return;  // 空は無視（メッセージなしで黙って弾く）
      if (raw.length > MAX_WORD_LEN) {
        alert('単語が長すぎます（' + MAX_WORD_LEN + '文字まで）');
        return;
      }
      const userWords = loadUserWords();
      if (userWords.length >= MAX_USER_WORDS) {
        alert('登録上限に達しています（' + MAX_USER_WORDS + '件まで）');
        return;
      }
      // 正規化後で重複チェック
      const nw = normalize(raw);
      if (userWords.some(w => normalize(w) === nw)) {
        alert('「' + raw + '」は既に追加済みです');
        return;
      }
      userWords.push(raw);
      if (!saveUserWords(userWords)) {
        // saveUserWords が false を返した場合（storageAvailable がここで false 化）
        showStorageBanner();
      }
      input.value = '';
      renderWordManager();
    }

    // ユーザー単語を削除
    function removeUserWord(index) {
      const userWords = loadUserWords();
      if (index < 0 || index >= userWords.length) return;
      userWords.splice(index, 1);
      saveUserWords(userWords);
      renderWordManager();
    }

    // チェック実行のメインフロー
    function runCheck() {
      const text = document.getElementById('input-text').value;
      if (text.trim() === '') {
        document.getElementById('result-list').innerHTML =
          '<p class="text-gray-500">テキストを入力してください</p>';
        document.getElementById('highlight-area').innerHTML =
          '<span class="text-gray-400">（チェック結果がここに表示されます）</span>';
        return;
      }
      const words = getAllWords();
      if (words.length === 0) {
        document.getElementById('result-list').innerHTML =
          '<p class="text-gray-500">チェック単語がありません</p>';
        return;
      }
      const matches = checkText(text, words);
      renderResultList(matches);
      renderHighlight(text, words);
    }

    // 入力と結果をクリア
    function clearInput() {
      document.getElementById('input-text').value = '';
      document.getElementById('result-list').innerHTML = '';
      document.getElementById('highlight-area').innerHTML =
        '<span class="text-gray-400">（チェック結果がここに表示されます）</span>';
    }

    // localStorage 不可時のバナーを表示
    function showStorageBanner() {
      const banner = document.getElementById('storage-banner');
      banner.textContent = '⚠ 保存機能が使えません。追加した単語はこのセッション中のみ有効です。';
      banner.classList.remove('hidden');
    }

    // 初期化
    function init() {
      // localStorage 可否判定
      try {
        const testKey = '__ngwc_test__';
        localStorage.setItem(testKey, '1');
        localStorage.removeItem(testKey);
        storageAvailable = true;
      } catch (e) {
        storageAvailable = false;
        showStorageBanner();
      }

      // イベントバインド
      document.getElementById('btn-check').addEventListener('click', runCheck);
      document.getElementById('btn-clear').addEventListener('click', clearInput);
      document.getElementById('btn-add-word').addEventListener('click', addUserWord);
      document.getElementById('user-word-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addUserWord();
        }
      });
      // ユーザー単語リストの削除ボタン（イベント委譲）
      document.getElementById('user-words-list').addEventListener('click', function(e) {
        const btn = e.target.closest('[data-del-index]');
        if (btn) {
          removeUserWord(parseInt(btn.getAttribute('data-del-index'), 10));
        }
      });

      // 初期描画
      renderWordManager();
    }

    // DOM構築後に初期化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
